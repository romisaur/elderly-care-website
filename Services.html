<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/logo2.png" style="width: 10px;">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-title {
            color: #3a82a6;
            font-size: 28px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        .service-card {
            border: 2px solid #a3c4d7;
            border-radius: 25px;
            padding: 30px 40px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            position: relative;
            background-color: #ffffff;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-grow: 1;
        }

        .service-image-icon {
            width: 90px;
            height: 90px;
            object-fit: contain;
            filter: invert(49%) sepia(48%) saturate(543%) hue-rotate(159deg) brightness(87%) contrast(85%);
        }

        .card-content h2 {
            color: #3a82a6;
            font-size: 22px;
            font-style: italic;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .selection-label {
            color: #7a7a7a;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5c8ba6;
            font-size: 18px;
            cursor: pointer;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            border: 1.5px solid #5c8ba6;
            appearance: none;
            -webkit-appearance: none;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            position: relative;
        }

        .checkbox-item input:checked {
            background-color: #5c8ba6;
        }
        
        .checkbox-item input:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            top: -1px;
            left: 3px;
        }

        .action-btn {
            background-color: #3a82a6;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
            align-self: flex-end;
            margin-bottom: 10px;
        }

        .action-btn:hover {
            background-color: #2c6583;
        }
    </style>
</head>
<body>

     <section class="header" id="header-placeholder">   </section> <!--lagayan parang reserve parking sa as sa footer-->
    

    <script>
       
        fetch('nav.html')
            .then(response => {
                if (!response.ok) throw new Error('Nav file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading navigation:', error));

      
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error('Footer file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading footer:', error));
            
    </script>















    <div class="container">
        <h1 class="page-title">Services</h1>

        <!-- In-Home Care Card -->
        <div class="service-card">
            <div class="card-left">
                <img class="service-image-icon" src="https://unpkg.com/@fortawesome/fontawesome-free@6.2.0/svgs/solid/hand-holding-heart.svg" alt="In-Home Care Icon">
                
                <div class="card-content">
                    <h2>In-Home Care</h2>
                    <div class="selection-label">Select Preferred Home Care</div>
                    <div class="checkbox-group">
                        <label class="checkbox-item"><input type="checkbox"> Personal Care Assistance</label>
                        <label class="checkbox-item"><input type="checkbox"> Meal Preparation</label>
                        <label class="checkbox-item"><input type="checkbox"> Light Housekeeping</label>
                        <label class="checkbox-item"><input type="checkbox"> Companionship</label>
                    </div>
                </div>
            </div>
            <a href="#loginModal"   class="action-btn" style="text-decoration: none;">Request In-Home Care</a>
        </div>

        <!-- Medical Care Assistance Card -->
        <div class="service-card">
            <div class="card-left">
                <img class="service-image-icon" src="https://unpkg.com/@fortawesome/fontawesome-free@6.2.0/svgs/solid/wheelchair.svg" alt="Medical Care Icon">
                
                <div class="card-content">
                    <h2>Medical Care Assistance</h2>
                    <div class="selection-label">Select Preferred Medical Care Assistance</div>
                    <div class="checkbox-group">
                        <label class="checkbox-item"><input type="checkbox"> Medication Management</label>
                        <label class="checkbox-item"><input type="checkbox"> Vital Sign Monitoring</label>
                        <label class="checkbox-item"><input type="checkbox"> Wound Care</label>
                        <label class="checkbox-item"><input type="checkbox"> Nursing Supervision</label>
                    </div>
                </div>
            </div>
            <a href="#loginModal"    class="action-btn"  style="text-decoration: none;">Book Medical Assistance</a>
        </div>
    </div>

    
  <section class="header" id="footer-placeholder">   </section>
</body>
</html>
