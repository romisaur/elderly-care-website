<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <link rel="stylesheet" href="style.css">
     <link rel="icon" type="image/png" href="images/logo2.png" style="width: 10px;">
   
</head>
<body>

    <!--NAVIGATORS CODE -->

    <section class="header" id="header-placeholder"></section>

   
    <script>
    
        fetch('nav.html')
            .then(response => {
                if (!response.ok) throw new Error('Nav file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading navigation:', error));

      
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error('Footer file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>
    






    <style>
        :root {
            --primary-blue: #4082A4;
            --dark-blue: #1E4E6D;
            --bg-light: #F4F8FA;
            --text-dark: #333333;
            --border-color: #D1E0E8;
            --placeholder: #A0B2BE;
            /*assign ng color sa text para madali*/
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rale way', sans-serif;
            font-weight: 700;
        }

        body {
            background-color: #ffffff;
            color: var(--text-dark);
            padding: 0 0 40px 0;
        }

        /* --- Main Form Container --- */
        .main-container {
            max-width: 1100px;
            margin: 5px auto;
            padding: 0 10px;
        }

        .form-card {
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 10px 40px;
            background-color: white;
        }

        .form-title {
            color: var(--primary-blue);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        /* --- Form Grid layout --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="text"], 
        input[type="date"], 
        select, 
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
            background-color: white;
        }

        input::placeholder, textarea::placeholder {
            color: var(--placeholder);
            font-weight: 600;
        }

      
        select {
            appearance: none;
            
            background-position: calc(100% - 16px) center;
            padding-right: 40px;
        }

        .table-container {
            margin-top: 10px;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-blue);
            color: white;
            text-align: left;
            padding: 12px 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #EAEAEA;
        }

        tr:nth-child(even) td {
            background-color: #F8FAFB;
        }

        tr:nth-child(odd) td {
            background-color: #EEF2F4;
        }

        .radio-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: #4A4A4A;
            cursor: pointer;
        }

        /* Custom Radio Styling */
        input[type="radio"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--primary-blue);
            border-radius: 50%;
            outline: none;
            background-color: white;
            cursor: pointer;
            display: inline-block;
            position: relative;
        }

        input[type="radio"]:checked::before {
            content: "";
            width: 8px;
            height: 8px;
            background-color: var(--primary-blue);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .location-cell {
            color: #555555;
            font-weight: 600;
        }

        .time-cell {
            color: #4A4A4A;
            font-weight: 700;
        }

        /* --- Bottom Row Layout --- */
        .bottom-flex {
            display: flex;
            gap: 30px;
            align-items: flex-end;
        }

        .reason-group {
            flex: 2;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .submit-container {
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            font-style: italic;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--dark-blue);
        }

        
    
    </style>
</head>
<body>
     <section class="header" id="header-placeholder">   </section>
    

    <script>
       
        fetch('nav.html')
            .then(response => {
                if (!response.ok) throw new Error('Nav file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading navigation:', error));

      
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error('Footer file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>







    <main class="main-container">
        <div class="form-card">
            
            <h2 class="form-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 14h6"></path><path d="M12 11v6"></path></svg>
                Online Appointment Form
            </h2>

            <form action="#" method="POST">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="full-name">    Full Name</label>
                        <input type="text" id="full-name" placeholder="Enter patient name" required>
                    </div>

                    <div class="form-group">
                        <label for="service">Choose Preferred Service</label>
                        <select id="service">
                            <option value="general-checkup">General Checkup</option>
                            <option value="cardio">Cardiology Consultation</option>
                            <option value="therapy">Physical Therapy</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="contact-number">Contact Number</label>
                        <input type="text" id="contact-number" placeholder="09XX - XXX - XXXX" required>
                    </div>

                    <div class="form-group">
                        <label for="preferred-date">Preferred Date</label>
                        <input type="date" id="preferred-date" required>
                    </div>
                </div>

                <label style="display: block; margin-bottom: 8px;">Select a Clinic & Preferred Time</label>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 35%;">Clinic Name</th>
                                <th style="width: 40%;">Location</th>
                                <th style="width: 25%;">Available Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <label class="radio-cell">
                                        <input type="radio" name="clinic" value="san-vicente" checked>
                                        San Vicente Community Clinic
                                    </label>
                                </td>
                                <td class="location-cell">San Vicente, Mabalacat City, Pampanga</td>
                                <td class="time-cell">09:00 AM - 12:00 PM</td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="radio-cell">
                                        <input type="radio" name="clinic" value="angeles-medical">
                                        Angeles Medical Center
                                    </label>
                                </td>
                                <td class="location-cell">Henson St., Angeles City, Pampanga</td>
                                <td class="time-cell">02:00 PM - 05:00 PM</td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="radio-cell">
                                        <input type="radio" name="clinic" value="st-raphael">
                                        St. Raphael Senior Wellness
                                    </label>
                                </td>
                                <td class="location-cell">San Simon, Pampanga</td>
                                <td class="time-cell">10:00 AM - 01:00 PM</td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="radio-cell">
                                        <input type="radio" name="clinic" value="guagua-hub">
                                        Guagua Senior Hub
                                    </label>
                                </td>
                                <td class="location-cell">Brgy. Plaza Burgos, Guagua, Pampanga</td>
                                <td class="time-cell">08:00 AM - 11:00 AM</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                                <div class="bottom-flex">
                                    <div class="form-group reason-group">
                                        <label for="reason">Reason for Appointment</label>
                                        <textarea id="reason" placeholder="Briefly describe your concerns..."></textarea>
                                    </div>
                                    
                                    <div class="submit-container">
                                        <a href="#loginModal" class="submit-btn" style="text-decoration: none;">
                                            Submit Appointment 
                                            
                                            
                                        </a>
                                    </div>
                                </div>
                    
                </div>

            </form>
        </div>
    </main>




     <section class="header" id="footer-placeholder">   </section>
</body>
</html>
