<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/logo2.png" style="width: 10px;">
    <title>Contact Us</title>

    <!-- CSS FILE -->
    <link rel="stylesheet" href="style.css">


    <style>
        /* CONTACT SECTION */

.contact{
    width: 100%;
    padding: 0 0;
    background-color:white;
}

.contact-title{
    width: 90%;
    margin: auto;
    margin-bottom: 20px;
}

.contact-title h1{
    color: #3d86b1;
    font-size: 45px;
    font-weight: 800;
}

.contact-title p{
    color: #333;
    font-size: 18px;
}

/* responsidve */

.contact-container{
    width: 95%;
    margin: auto;

    display: flex;
    flex-wrap: wrap;

    justify-content: space-between;
    gap: 30px;
}

/* left side */

.contact-form{
    flex: 1 1 600px;
    min-width: 300px;

    background: white;
    border: 2px solid #444;
    border-radius: 15px;
    padding: 25px;
}

.contact-form form label{
    display: block;
    margin-bottom: 8px;
    font-size: 18px;
}

/* inputs */

.contact-form input,
.contact-form select,
.contact-form textarea{
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;

    border: 2px solid #999;
    border-radius: 15px;

    outline: none;
    font-size: 16px;

    box-sizing: border-box;
}

/* AUTO EXPAND TEXTAREA */

.contact-form textarea{
    min-height: 180px;
    resize: none;
}

/* RESPONSIVE ROW */

.row{
    display: flex;
    flex-wrap: wrap;

    gap: 20px;
    width: 100%;
}

.input-group{
    flex: 1 1 250px;
}

/* buttons */

.button-group{
    display: flex;
    flex-wrap: wrap;

    gap: 20px;
}

.send-btn,
.reset-btn{
    flex: 1 1 250px;

    padding: 15px;

    border-radius: 15px;
    border: none;

    font-size: 20px;
    font-weight: bold;

    cursor: pointer;
}

.send-btn{
    background-color: #3d86b1;
    color: white;
}

.reset-btn{
    background-color: white;
    border: 2px solid #999;
    color: #3d86b1;
}

/* RIGHT SIDE */

.contact-info{
    flex: 1 1 300px;
    min-width: 250px;

    display: flex;
    flex-direction: column;
    gap: 20px;
}

.info-box,
.follow-box{
    background: white;
    border: 2px solid #444;
    border-radius: 15px;
    overflow: hidden;
}

.info-box h2,
.follow-box h2{
    background-color: #3d86b1;
    color: white;

    text-align: center;

    padding: 15px;
    font-size: 22px;
}

.info-item{
    display: flex;
    align-items: center;

    gap: 15px;
    padding: 20px;
}

.info-item span{
    font-size: 35px;
}

.info-item h3{
    margin-bottom: 5px;
}

/* sc icons */

.social-icons{
    display: flex;
    justify-content: center;
    align-items: center;

    gap: 20px;
    padding: 20px;

    flex-wrap: wrap;
}

.social-icons img{
    width: 25px;
    height: 25px;

    transition: 0.3s;
    cursor: pointer;
}

.social-icons img:hover{
    transform: scale(1.1);
}

/* MOBILE RESPONSIVE */

@media(max-width: 768px){

    .contact-title h1{
        font-size: 32px;
    }

    .contact-container{
        flex-direction: column;
    }

    .row{
        flex-direction: column;
    }

    .button-group{
        flex-direction: column;
    }

}

    </style>
</head>

<body>

<section class="header" id="header-placeholder">   </section>
    

    <script>
       
        fetch('nav.html')
            .then(response => {
                if (!response.ok) throw new Error('Nav file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading navigation:', error));

      
        fetch('footer.html')
            .then(response => {
                if (!response.ok) throw new Error('Footer file not found');
                return response.text();
            })
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading footer:', error));
            
    </script>

    






<section class="contact" id="contact">

    <div class="contact-title">
        <h1>CONTACT US</h1>
        <p>We're here to help. Reach out to us anytime.</p>
    </div>

    <div class="contact-container">

        <!-- LEFT SIDE -->
        <div class="contact-form">

            <form id="contactForm">

                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>

                <div class="row">

                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email address" required>
                    </div>

                    <div class="input-group">
                        <label>Care Request Type</label>

                        <select id="requestType" required>
                            <option value="">Select the type of request</option>
                            <option>Home Care</option>
                            <option>Medical Assistance</option>
                            <option>Caregiver Support</option>
                        </select>
                    </div>

                </div>

                <label>Message</label>

                <textarea id="message" rows="7" placeholder="Type your message here..." required></textarea>

                <div class="button-group">

                    <button type="submit" class="send-btn">
                        SEND MESSAGE
                    </button>

                    <button type="reset" class="reset-btn">
                        RESET
                    </button>

                </div>

            </form>

        </div>

        <!-- RIGHT SIDE -->
        <div class="contact-info">

            <!-- CONTACT INFO -->
            <div class="info-box">

                <h2>CONTACT INFORMATION</h2>

                <div class="info-item">

                    <span>📞</span>

                    <div>
                        <h3>Phone</h3>
                        <p>+1 (555) 019-2834</p>
                    </div>

                </div>

                <div class="info-item">

                    <span>✉️</span>

                    <div>
                        <h3>Email</h3>
                        <p>support@gmail.com</p>
                    </div>

                </div>

                <div class="info-item">

                    <span>📍</span>

                    <div>
                        <h3>Address</h3>
                        <p>
                            123 Healthcare St., Wellness City,
                            <br>
                            Philippines 1000
                        </p>
                    </div>

                </div>

            </div>

            <!-- FOLLOW US -->
            <div class="follow-box">

                <h2>FOLLOW US</h2>

                <div class="social-icons">

                    <a href="#">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                    </a>

                    <a href="#">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter">
                    </a>

                    <a href="#">
                        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
                    </a>

                    <a href="#">
                        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- JAVASCRIPT -->
<script>

const textarea = document.querySelector("textarea");

/* AUTO EXPAND TEXTAREA */

textarea.addEventListener("input", function () {

    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";

});

/* FORM SUBMIT */

document.getElementById("contactForm").addEventListener("submit", function(event){

    event.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const request = document.getElementById("requestType").value;
    const message = document.getElementById("message").value;

    if(name && email && request && message){

        alert("Message Sent Successfully!");

        document.getElementById("contactForm").reset();

        textarea.style.height = "180px";
    }

});

</script>
        
  <section class="header" id="footer-placeholder">   </section>
</body>
</html>
